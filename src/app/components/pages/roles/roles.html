<div class="roles-container">
  <header class="page-header">
    <span class="edu-badge">EDUCATIONAL GUIDE</span>
    <h1>Hero <span class="blue-text">Roles</span></h1>
    <p class="intro-text">
      Each role has a unique job in the team. Understanding your role is the <br>
      first step to mastering the battlefield and achieving victory.
    </p>
  </header>

  <main class="roles-grid">
    <div class="role-card" *ngFor="let role of roles">
      <div class="card-header">
        <div class="icon-box">{{ role.icon }}</div>
        <div class="title-group">
          <h3>{{ role.title }}</h3>
          <span class="subtitle">{{ role.subtitle }}</span>
        </div>
      </div>

      <p class="role-desc">{{ role.desc }}</p>

      <div class="stats-section">
        <label>KEY STATS FOCUS</label>
        <div class="stats-pills">
          <span class="pill" *ngFor="let stat of role.stats">{{ stat }}</span>
        </div>
      </div>
    </div>
  </main>
</div>
