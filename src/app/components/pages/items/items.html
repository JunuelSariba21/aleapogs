<div class="items-container">
  <header class="page-header">
    <h1 class="premium-title">EQUIPMENT ARCHIVE</h1>
    <div class="search-box">
      <input type="text" placeholder="Search item or category..." (input)="onSearch($event)">
    </div>
  </header>

  <div class="item-grid">
    <div class="item-card" *ngFor="let item of filteredItems()" [routerLink]="['/items', item.item_name]">
      <div class="icon-holder">
        <img [src]="item.item_icon" [alt]="item.item_name" onerror="this.src='https://placehold.co/100/1e293b/white?text=⚔️'">
      </div>
      <div class="card-body">
        <span class="category-tag">{{ item.category }}</span>
        <h3>{{ item.item_name }}</h3>
        <p class="price">💰 {{ item.price }}</p>
      </div>
    </div>
  </div>
</div>
