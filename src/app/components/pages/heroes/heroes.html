<div class="gallery-wrapper">
  
  <header class="header">
    <div class="updated-banner">UPDATED SEASON 31</div>
    <h1>Hero <span class="highlight">Gallery</span></h1>
    <p>Master the legends of the Land of Dawn. Explore stats, builds, and strategies for every hero.</p>
  </header>

  <div class="controls-container">
    <div class="search-bar">
      <span class="search-icon">🔍</span>
      <input type="text" placeholder="Search heroes (e.g. Gusion, Miya, Tigreal...)">
      <span class="x-icon">✖</span>
    </div>

    <div class="filter-buttons">
      <button *ngFor="let role of roles; let i = index" [class.active]="i === 0">
        <span class="role-icon"></span>
        {{role}}
      </button>
    </div>
  </div>

<main class="hero-grid">
  <div class="hero-card" *ngFor="let hero of heroes">
    
    <div class="image-container">
      <img *ngIf="hero.image" [src]="hero.image" [alt]="hero.name" class="hero-img">
      <div *ngIf="!hero.image" class="image-placeholder">
        <span class="no-image-text">No Image</span>
      </div>
    </div>
    
    <div class="card-details">
      <h4>{{ hero.name }}</h4>
      <p>{{ hero.role }}</p>
    </div>
  </div>
</main>

  <footer class="footer">
    <button class="load-more-btn">
      Load More Legends 
      <span class="arrow-down">▼</span>
    </button>
  </footer>

</div>
