<div class="gallery-wrapper">
  
  <header class="header">
    <div class="updated-banner">SEASON 31 META</div>
    <h1>Hero <span class="highlight">Gallery</span></h1>
    <p>Select a hero to explore their specific item compatibility and stats.</p>
  </header>

  <div class="controls-container">
    <div class="search-bar">
      <span class="search-icon">🔍</span>
      <input 
        type="text" 
        [(ngModel)]="searchQuery" 
        placeholder="Search for a legend...">
    </div>

    <div class="filter-buttons">
      <button 
        *ngFor="let role of roles" 
        (click)="setRole(role)"
        [class.active]="selectedRole() === role">
        {{role}}
      </button>
    </div>
  </div>

  <main class="hero-grid">
  <div 
    class="hero-card" 
    *ngFor="let hero of filteredHeroes()" 
    [routerLink]="['/heroes', hero.name]"> <div class="image-container">
      <img [src]="hero.image" [alt]="hero.name" class="hero-img">
      <div class="card-overlay">
        <span class="view-btn">VIEW STATS</span>
      </div>
    </div>
    
    <div class="card-details">
      <h4>{{ hero.name }}</h4>
      <p>{{ hero.role }}</p>
    </div>
  </div>
</main>

  <div class="empty-state" *ngIf="filteredHeroes().length === 0">
    <p>No heroes found. Try a different role or name.</p>
  </div>

</div>
