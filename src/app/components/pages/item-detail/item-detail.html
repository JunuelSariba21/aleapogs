<div class="item-detail-wrapper" *ngIf="item() as i">
  <div class="glass-card">
    
    <!-- HEADER -->
    <div class="detail-header">
      <div class="icon-container">
        <img
          [src]="i.item_icon"
          [alt]="i.item_name"
          onerror="this.src='assets/items/default-item.png'">
      </div>

      <div class="title-group">
        <span class="category-tag">{{ i.category }}</span>
        <h1>{{ i.item_name }}</h1>
        <p class="cost-tag">💰 {{ i.price }} Gold</p>
      </div>
    </div>

    <!-- DESCRIPTION -->
    <div *ngIf="i.description">
      <h4 class="section-label">DESCRIPTION</h4>
      <div class="passive-item">
        <p class="passive-desc">{{ i.description }}</p>
      </div>
    </div>

    <!-- ATTRIBUTES -->
    <div *ngIf="i.modifiers?.length">
      <h4 class="section-label">ATTRIBUTES</h4>
      <div class="stats-list">
        <div class="stat-pill" *ngFor="let mod of i.modifiers">
          <span class="stat-value">{{ mod }}</span>
        </div>
      </div>
    </div>

    <!-- PASSIVE -->
    <div *ngIf="i.unique_passive">
      <h4 class="section-label">UNIQUE PASSIVE</h4>
      <div class="passive-item">
        <p class="passive-desc">{{ i.unique_passive }}</p>
      </div>
    </div>

    <!-- BACK -->
    <button routerLink="/items" class="btn-back">
      ← BACK TO SHOP
    </button>
  </div>
</div>
