<div class="login-wrapper">
  <div class="login-card">
    <div class="header">
      <div class="logo-box">
        <span class="sword-icon">⚔</span>
      </div>
      <h1>Build of Dawn</h1>
      <p class="subtitle">Access the Ultimate MLBB Guide Library</p>
    </div>

    <div class="error-toast" *ngIf="errorMessage()">
      <span>⚠️</span> {{ errorMessage() }}
    </div>

    <form (submit)="login(); $event.preventDefault()">
      <div class="input-group">
        <label>Username or Email</label>
        <div class="input-container">
          <span class="icon">👤</span>
          <input 
            type="text" 
            [(ngModel)]="username" 
            [disabled]="isLoading()"
            name="username" 
            placeholder="Summoner name (admin)">
        </div>
      </div>

      <div class="input-group">
        <label>Password</label>
        <div class="input-container">
          <span class="icon">🔒</span>
          <input 
            [type]="showPassword() ? 'text' : 'password'" 
            [(ngModel)]="password" 
            [disabled]="isLoading()"
            name="password" 
            placeholder="••••••••">
          <span class="toggle-eye" (click)="showPassword.set(!showPassword())">
            {{ showPassword() ? '🙈' : '👁' }}
          </span>
        </div>
      </div>

      <button type="submit" class="login-btn" [disabled]="isLoading()">
        <span *ngIf="!isLoading()">SIGN IN TO DAWN ➜</span>
        <span *ngIf="isLoading()" class="loader"></span>
      </button>
    </form>

    <div class="divider">
      <span>OR CONTINUE WITH</span>
    </div>

    <div class="social-grid">
      <button class="social-btn">Google</button>
      <button class="social-btn">Discord</button>
    </div>

    <p class="footer-text">
      New to the Land of Dawn? <a routerLink="/register" class="create-link">Create an Account</a>
    </p>
  </div>
</div>
